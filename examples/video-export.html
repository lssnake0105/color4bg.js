<html lang="zh-CN">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.tailwindcss.com"></script>
		<title>Export color4bg.js</title>
		<style>
			html,
			body {
				width: 100%;
				height: 100%;
			}

			#bg_list::-webkit-scrollbar,
			.panel-scroll::-webkit-scrollbar {
				width: 5px;
			}
			#bg_list::-webkit-scrollbar-track,
			.panel-scroll::-webkit-scrollbar-track {
				margin: 20px;
			}
			#bg_list::-webkit-scrollbar-thumb,
			.panel-scroll::-webkit-scrollbar-thumb {
				background-color: #e5e7eb;
				border-radius: 4px;
			}

			.colors-list-box,
			.options-list-box,
			.advanced-list-box,
			.export-list-box {
				display: none;
				position: absolute;
				top: calc(100% + 0.5rem);
				right: 0;
				transform-origin: 100% 0;
				transform: scale(0);
				opacity: 0;
			}
			.colors-list-box.show,
			.options-list-box.show,
			.advanced-list-box.show,
			.export-list-box.show {
				transform: scale(1);
				opacity: 1;
			}
			.toolbar-item {
				position: relative;
			}
			.toolbar-item.is-open {
				z-index: 80;
			}
			.toolbar-button {
				display: inline-flex;
				align-items: center;
				gap: 0.35rem;
				min-width: 5.5rem;
				justify-content: center;
				border-radius: 9999px;
				padding: 0.65rem 0.9rem;
				background: rgba(255, 255, 255, 0.32);
				color: #111827;
				font-size: 0.875rem;
				font-weight: 700;
				line-height: 1;
				backdrop-filter: blur(12px);
				box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
				transition:
					background-color 160ms ease,
					opacity 160ms ease,
					transform 160ms ease;
			}
			.toolbar-button:hover {
				background: rgba(255, 255, 255, 0.52);
			}
			.toolbar-button .icon {
				font-size: 1.1rem;
			}
			.toolbar-item.is-open .toolbar-button {
				opacity: 0;
				pointer-events: none;
				transform: translateY(-0.25rem);
			}
		</style>
	</head>

	<body>
		<div class="flex h-screen">
			<div class="px-6 w-64 h-screen">
				<div id="bg_list" class="p-6 w-full h-full overflow-y-auto overflow-x-hidden rounded-2xl"></div>
			</div>

			<div class="p-6 flex-1 h-full bg-white">
				<div id="box" class="relative flex items-center justify-center w-full h-full bg-gray-100 rounded-2xl overflow-hidden">
					<div id="export-stage" class="absolute top-1/2 left-1/2 bg-gray-900 overflow-hidden"></div>
					<div class="z-50 absolute bottom-6 left-6 px-4 py-3 rounded-lg bg-black/30 text-white backdrop-blur">
						<div class="text-sm font-semibold">1920 x 1080 export stage</div>
						<div class="text-xs opacity-80" id="estimate_label">5400 frames</div>
					</div>

					<div class="z-50 absolute top-4 right-4 flex items-start gap-2">
						<div class="toolbar-item" id="box_colors">
							<button class="toolbar-button cursor-pointer" id="btn_show_colors" type="button">
								<span class="icon">🎨</span>
								<span>配色</span>
							</button>
							<div class="colors-list-box p-4 bg-gray-100 rounded-2xl transition shadow-2xl">
								<div class="px-2 pb-2 text-sm text-gray-500">Palette: <span id="active_palette" class="font-semibold text-gray-700">vivid</span></div>
								<ul id="colors_list" class="panel-scroll w-96 max-h-[72vh] overflow-y-auto"></ul>
							</div>
						</div>

						<div class="toolbar-item" id="box_options">
							<button class="toolbar-button cursor-pointer" id="btn_show_options" type="button">
								<span class="icon">🎛</span>
								<span>基础</span>
							</button>
							<div class="options-list-box p-4 bg-gray-100 rounded-2xl transition shadow-2xl">
								<div class="px-2 pb-2 text-sm font-semibold text-gray-600">Basic Options</div>
								<ul id="options_list" class="panel-scroll max-h-[70vh] overflow-y-auto"></ul>
							</div>
						</div>

						<div class="toolbar-item" id="box_advanced_options">
							<button class="toolbar-button cursor-pointer" id="btn_show_advanced_options" type="button">
								<span class="icon">🔧</span>
								<span>高级</span>
							</button>
							<div class="advanced-list-box p-4 bg-gray-100 rounded-2xl transition shadow-2xl">
								<div class="px-2 pb-2 text-sm font-semibold text-gray-600">Advanced Uniforms</div>
								<ul id="advanced_options_list" class="panel-scroll max-h-[70vh] overflow-y-auto"></ul>
							</div>
						</div>

						<div class="toolbar-item" id="box_export">
							<button class="toolbar-button cursor-pointer" id="btn_show_export" type="button">
								<span class="icon">⏺</span>
								<span>导出</span>
							</button>
							<div class="export-list-box p-4 w-96 bg-gray-100 rounded-2xl transition shadow-2xl">
								<div class="px-2 pb-2 text-sm font-semibold text-gray-600">Video Export</div>
								<div class="panel-scroll max-h-[70vh] overflow-y-auto px-2">
									<label class="block mt-3 text-xs font-semibold text-gray-500">Duration (seconds)</label>
									<input id="duration_input" class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2" type="number" min="1" max="600" value="180" />

									<label class="block mt-3 text-xs font-semibold text-gray-500">FPS</label>
									<select id="fps_select" class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2">
										<option value="30" selected>30 fps</option>
										<option value="60">60 fps</option>
									</select>

									<label class="block mt-3 text-xs font-semibold text-gray-500">Bitrate</label>
									<select id="bitrate_select" class="mt-1 w-full rounded-lg border border-gray-300 px-3 py-2">
										<option value="16000000">16 Mbps</option>
										<option value="30000000" selected>30 Mbps</option>
										<option value="50000000">50 Mbps</option>
									</select>

									<div class="mt-4 grid grid-cols-2 gap-2">
										<button id="record_btn" class="rounded-lg bg-blue-600 px-4 py-2 text-white font-semibold hover:bg-blue-700">Start</button>
										<button id="stop_btn" class="rounded-lg bg-red-600 px-4 py-2 text-white font-semibold hover:bg-red-700 disabled:opacity-50" disabled>Stop</button>
									</div>

									<progress id="progress" class="mt-4 w-full" value="0" max="1"></progress>
									<div id="status_line" class="mt-2 text-sm text-gray-600">Ready.</div>
									<a id="download_link" class="hidden mt-3 rounded-lg bg-green-600 px-4 py-2 text-center text-white font-semibold" download>Download video</a>
									<div id="support_note" class="mt-3 text-xs text-gray-500 leading-relaxed"></div>
								</div>
							</div>
						</div>
					</div>

					<div class="z-40 absolute top-4 left-20" id="box_seed">
						<div class="absolute p-4 right-0 text-4xl rounded-full bg-gray-100/20 cursor-pointer hover:bg-gray-100/30 transition" id="btn_resetSeed">🎲</div>
					</div>
				</div>
			</div>
		</div>

		<script type="module">
			import { Colors, ColorGroups, Options, Bgs } from "./data.js"

			const stage = document.querySelector("#export-stage")
			const colorsList = document.querySelector("#colors_list")
			const optionsList = document.querySelector("#options_list")
			const advancedList = document.querySelector("#advanced_options_list")
			const activePalette = document.querySelector("#active_palette")
			const durationInput = document.querySelector("#duration_input")
			const fpsSelect = document.querySelector("#fps_select")
			const bitrateSelect = document.querySelector("#bitrate_select")
			const recordBtn = document.querySelector("#record_btn")
			const stopBtn = document.querySelector("#stop_btn")
			const progress = document.querySelector("#progress")
			const statusLine = document.querySelector("#status_line")
			const supportNote = document.querySelector("#support_note")
			const downloadLink = document.querySelector("#download_link")
			const estimateLabel = document.querySelector("#estimate_label")

			const recorderFormats = [
				{ mimeType: "video/mp4;codecs=avc1.42E01E", extension: "mp4", label: "MP4 / H.264" },
				{ mimeType: "video/mp4", extension: "mp4", label: "MP4" },
				{ mimeType: "video/webm;codecs=vp9", extension: "webm", label: "WebM / VP9" },
				{ mimeType: "video/webm;codecs=vp8", extension: "webm", label: "WebM / VP8" },
				{ mimeType: "video/webm", extension: "webm", label: "WebM" }
			]
			const CustomPaletteStorageKey = "color4bg.videoExport.customPalettes"
			const CustomPaletteColorCount = 6

			let currentBg = Bgs.find((item) => item.name === getBgFromUrl()) || Bgs.find((item) => item.name === "ambient-light") || Bgs[0]
			let currentPalette = currentBg.palette || "vivid"
			let customPaletteColors = null
			let colorbg = null
			let mediaRecorder = null
			let recordTimer = null
			let progressTimer = null
			let startedAt = 0
			let objectUrl = ""
			let activeFormat = getSupportedFormat()

			init()

			function init() {
				setupStageScale()
				window.addEventListener("resize", setupStageScale)
				listColorBgs()
				listPalettes()
				recreateBackground()
				bindPanels()
				bindExport()
				updateEstimate()

				if (activeFormat) {
					supportNote.textContent = `Current encoder: ${activeFormat.label}. Keep this tab open while exporting.`
				} else {
					supportNote.textContent = "MediaRecorder video export is not supported in this browser."
					recordBtn.disabled = true
				}
			}

			function setupStageScale() {
				const box = document.querySelector("#box")
				const scale = Math.min(box.clientWidth / 1920, box.clientHeight / 1080)
				stage.style.width = "1920px"
				stage.style.height = "1080px"
				stage.style.transform = `translate(-50%, -50%) scale(${scale})`
				stage.style.transformOrigin = "center center"
			}

			function listColorBgs() {
				const list = document.querySelector("#bg_list")
				list.innerHTML = ""
				Bgs.forEach((item) => {
					const image = document.createElement("img")
					image.src = `./assets/images/${item.name}.jpg`
					image.setAttribute("class", "rounded-lg hover:opacity-85 cursor-pointer")

					const title = document.createElement("div")
					title.setAttribute("class", "mt-1 text-sm text-gray-500")
					title.textContent = item.name

					const link = document.createElement("a")
					link.setAttribute("class", "bg-item block mb-2")
					link.href = `./video-export.html?bg=${item.name}`
					link.addEventListener("click", (event) => {
						event.preventDefault()
						currentBg = item
						history.replaceState(null, "", `./video-export.html?bg=${item.name}`)
						recreateBackground()
					})
					link.append(image, title)
					list.appendChild(link)
				})
			}

			function listPalettes() {
				colorsList.innerHTML = ""
				addCustomPaletteEditor()
				addPhotoPaletteImporter()
				for (const groupName in ColorGroups) {
					const groupTitle = document.createElement("li")
					groupTitle.setAttribute("class", "mt-4 mb-1 px-2 text-xs font-bold uppercase tracking-wide text-gray-500")
					groupTitle.textContent = groupName
					colorsList.appendChild(groupTitle)

					for (const paletteKey in ColorGroups[groupName]) {
						const palette = ColorGroups[groupName][paletteKey]
						const row = document.createElement("li")
						row.setAttribute("class", "color-row m-2 p-3 min-w-64 hover:bg-white/50 rounded-lg cursor-pointer")
						row.addEventListener("click", () => {
							currentPalette = paletteKey
							applyPalette(paletteKey)
						})

						const title = document.createElement("div")
						title.setAttribute("class", "mb-2 flex items-center justify-between gap-4 text-sm font-semibold text-gray-600")
						title.innerHTML = `<span>${paletteKey}</span><span class="text-xs font-normal text-gray-400">${groupName}</span>`

						const preview = document.createElement("div")
						preview.setAttribute("class", "flex justify-evenly gap-1")
						palette.forEach((hex) => {
							const swatch = document.createElement("div")
							swatch.setAttribute("class", "h-8 flex-1 rounded-lg border border-white/70 shadow-sm")
							swatch.style.background = hex
							preview.appendChild(swatch)
						})

						row.append(title, preview)
						colorsList.appendChild(row)
					}
				}
			}

			function recreateBackground() {
				if (mediaRecorder && mediaRecorder.state === "recording") return
				if (objectUrl) URL.revokeObjectURL(objectUrl)
				objectUrl = ""
				downloadLink.classList.add("hidden")
				downloadLink.removeAttribute("href")

				if (colorbg) colorbg.destroy()
				stage.innerHTML = ""
				currentPalette = currentPalette in Colors || customPaletteColors ? currentPalette : currentBg.palette || "vivid"
				const colors = customPaletteColors && !(currentPalette in Colors) ? customPaletteColors : Colors[currentPalette]
				activePalette.textContent = currentPalette
				colorbg = new currentBg.class({
					dom: "export-stage",
					colors: [...colors],
					seed: 1000,
					loop: true,
					playbackSpeed: 1
				})
				buildBasicOptions()
				buildAdvancedOptions()
			}

			function applyPalette(name) {
				customPaletteColors = null
				activePalette.textContent = name
				if (colorbg) colorbg.colors([...Colors[name]])
			}

			function applyCustomPalette(colors, label = "photo import") {
				customPaletteColors = [...colors]
				currentPalette = label
				activePalette.textContent = label
				if (colorbg) colorbg.colors([...customPaletteColors])
			}

			function addCustomPaletteEditor() {
				const row = document.createElement("li")
				row.setAttribute("class", "m-2 p-3 min-w-64 rounded-lg border border-gray-300 bg-white/80")

				const title = document.createElement("div")
				title.setAttribute("class", "mb-3 text-sm font-semibold text-gray-700")
				title.textContent = "自定义配色方案"

				const nameInput = document.createElement("input")
				nameInput.type = "text"
				nameInput.placeholder = "方案名称"
				nameInput.setAttribute("class", "mb-3 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm")

				const pickerGrid = document.createElement("div")
				pickerGrid.setAttribute("class", "grid grid-cols-6 gap-2")

				const initialColors = getCurrentEditorColors()
				const colorInputs = initialColors.map((hex) => {
					const input = document.createElement("input")
					input.type = "color"
					input.value = hex
					input.setAttribute("class", "h-10 w-full cursor-pointer rounded-lg border border-white/70 bg-transparent p-0")
					pickerGrid.appendChild(input)
					return input
				})

				const actionRow = document.createElement("div")
				actionRow.setAttribute("class", "mt-3 grid grid-cols-2 gap-2")

				const applyButton = document.createElement("button")
				applyButton.type = "button"
				applyButton.setAttribute("class", "rounded-lg bg-gray-900 px-3 py-2 text-sm font-semibold text-white hover:bg-gray-700")
				applyButton.textContent = "应用当前配色"

				const saveButton = document.createElement("button")
				saveButton.type = "button"
				saveButton.setAttribute("class", "rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700")
				saveButton.textContent = "保存方案"

				const status = document.createElement("div")
				status.setAttribute("class", "mt-2 text-xs text-gray-500")
				status.textContent = "固定 6 色，保存后会保留在当前浏览器。"

				const savedList = document.createElement("div")
				savedList.setAttribute("class", "mt-4")

				function readEditorColors() {
					return colorInputs.map((input) => normalizeHexColor(input.value)).filter(Boolean)
				}

				function applyEditorColors() {
					const colors = readEditorColors()
					if (!isValidPaletteColors(colors)) {
						status.textContent = "请输入 6 个有效颜色。"
						return null
					}
					const label = nameInput.value.trim() || "custom palette"
					applyCustomPalette(colors, label)
					status.textContent = `已应用 ${label}。`
					return colors
				}

				applyButton.addEventListener("click", applyEditorColors)
				saveButton.addEventListener("click", () => {
					const colors = applyEditorColors()
					if (!colors) return
					const name = getCustomPaletteName(nameInput.value)
					nameInput.value = name
					saveCustomPalette({ name, colors, createdAt: Date.now() })
					applyCustomPalette(colors, name)
					status.textContent = `已保存 ${name}。`
					renderSavedCustomPalettes(savedList, colorInputs, nameInput, status)
				})

				actionRow.append(applyButton, saveButton)
				row.append(title, nameInput, pickerGrid, actionRow, status, savedList)
				colorsList.appendChild(row)
				renderSavedCustomPalettes(savedList, colorInputs, nameInput, status)
			}

			function renderSavedCustomPalettes(container, colorInputs, nameInput, status) {
				const palettes = loadCustomPalettes()
				container.innerHTML = ""

				if (palettes.length === 0) {
					const empty = document.createElement("div")
					empty.setAttribute("class", "rounded-lg bg-gray-50 px-3 py-2 text-xs text-gray-400")
					empty.textContent = "暂无已保存方案。"
					container.appendChild(empty)
					return
				}

				const heading = document.createElement("div")
				heading.setAttribute("class", "mb-2 text-xs font-bold uppercase tracking-wide text-gray-500")
				heading.textContent = "Saved Custom"
				container.appendChild(heading)

				palettes.forEach((palette) => {
					const item = document.createElement("div")
					item.setAttribute("class", "mb-2 rounded-lg bg-gray-50 p-2")

					const header = document.createElement("div")
					header.setAttribute("class", "mb-2 flex items-center justify-between gap-2")

					const name = document.createElement("div")
					name.setAttribute("class", "min-w-0 flex-1 truncate text-sm font-semibold text-gray-700")
					name.textContent = palette.name

					const applyButton = document.createElement("button")
					applyButton.type = "button"
					applyButton.setAttribute("class", "rounded-md px-2 py-1 text-xs font-semibold text-blue-600 hover:bg-blue-50")
					applyButton.textContent = "应用"

					const deleteButton = document.createElement("button")
					deleteButton.type = "button"
					deleteButton.setAttribute("class", "rounded-md px-2 py-1 text-xs font-semibold text-red-600 hover:bg-red-50")
					deleteButton.textContent = "删除"

					const preview = document.createElement("div")
					preview.setAttribute("class", "flex justify-evenly gap-1")
					palette.colors.forEach((hex) => {
						const swatch = document.createElement("button")
						swatch.type = "button"
						swatch.setAttribute("class", "h-8 flex-1 rounded-lg border border-white/70 shadow-sm")
						swatch.style.background = hex
						swatch.setAttribute("aria-label", `应用 ${palette.name}`)
						swatch.addEventListener("click", () => applySavedCustomPalette(palette, colorInputs, nameInput, status))
						preview.appendChild(swatch)
					})

					header.addEventListener("click", () => applySavedCustomPalette(palette, colorInputs, nameInput, status))
					applyButton.addEventListener("click", (event) => {
						event.stopPropagation()
						applySavedCustomPalette(palette, colorInputs, nameInput, status)
					})
					deleteButton.addEventListener("click", (event) => {
						event.stopPropagation()
						deleteCustomPalette(palette.name)
						status.textContent = `已删除 ${palette.name}。`
						renderSavedCustomPalettes(container, colorInputs, nameInput, status)
					})

					header.append(name, applyButton, deleteButton)
					item.append(header, preview)
					container.appendChild(item)
				})
			}

			function applySavedCustomPalette(palette, colorInputs, nameInput, status) {
				palette.colors.forEach((hex, index) => {
					if (colorInputs[index]) colorInputs[index].value = hex
				})
				nameInput.value = palette.name
				applyCustomPalette(palette.colors, palette.name)
				status.textContent = `已应用 ${palette.name}。`
			}

			function loadCustomPalettes() {
				try {
					const parsed = JSON.parse(localStorage.getItem(CustomPaletteStorageKey) || "[]")
					if (!Array.isArray(parsed)) return []
					return parsed
						.map((palette) => ({
							name: typeof palette.name === "string" ? palette.name.trim() : "",
							colors: Array.isArray(palette.colors) ? palette.colors.map(normalizeHexColor).filter(Boolean) : [],
							createdAt: Number(palette.createdAt) || Date.now()
						}))
						.filter((palette) => palette.name && isValidPaletteColors(palette.colors))
				} catch (error) {
					console.warn("Unable to read custom palettes.", error)
					return []
				}
			}

			function saveCustomPalette(palette) {
				const palettes = loadCustomPalettes().filter((item) => item.name !== palette.name)
				palettes.unshift(palette)
				try {
					localStorage.setItem(CustomPaletteStorageKey, JSON.stringify(palettes))
				} catch (error) {
					console.warn("Unable to save custom palettes.", error)
				}
			}

			function deleteCustomPalette(name) {
				const palettes = loadCustomPalettes().filter((palette) => palette.name !== name)
				try {
					localStorage.setItem(CustomPaletteStorageKey, JSON.stringify(palettes))
				} catch (error) {
					console.warn("Unable to delete custom palette.", error)
				}
			}

			function getCustomPaletteName(rawName) {
				const name = rawName.trim()
				if (name) return name
				const existing = new Set(loadCustomPalettes().map((palette) => palette.name))
				let index = 1
				while (existing.has(`Custom Palette ${index}`)) index += 1
				return `Custom Palette ${index}`
			}

			function getCurrentEditorColors() {
				if (customPaletteColors && isValidPaletteColors(customPaletteColors)) return customPaletteColors
				if (Colors[currentPalette]) return Colors[currentPalette].slice(0, CustomPaletteColorCount)
				return Colors[currentBg.palette] || Colors.vivid
			}

			function isValidPaletteColors(colors) {
				return Array.isArray(colors) && colors.length === CustomPaletteColorCount && colors.every(Boolean)
			}

			function normalizeHexColor(value) {
				if (typeof value !== "string") return ""
				const hex = value.trim()
				if (/^#[0-9a-f]{6}$/i.test(hex)) return hex.toUpperCase()
				return ""
			}

			function addPhotoPaletteImporter() {
				const row = document.createElement("li")
				row.setAttribute("class", "m-2 p-3 min-w-64 rounded-lg border border-dashed border-gray-300 bg-white/70")

				const label = document.createElement("label")
				label.setAttribute("class", "block cursor-pointer rounded-lg bg-gray-900 px-4 py-3 text-center text-sm font-semibold text-white hover:bg-gray-700")
				label.textContent = "导入照片提取配色"

				const input = document.createElement("input")
				input.type = "file"
				input.accept = "image/*"
				input.setAttribute("class", "hidden")

				const status = document.createElement("div")
				status.setAttribute("class", "mt-2 text-xs text-gray-500")
				status.textContent = "选择本地图片后自动生成 6 色方案。"

				const preview = document.createElement("div")
				preview.setAttribute("class", "mt-3 hidden justify-evenly gap-1")

				input.addEventListener("change", async () => {
					const file = input.files && input.files[0]
					if (!file) return
					status.textContent = "正在分析图片颜色..."
					try {
						const colors = await extractPaletteFromImage(file, 6)
						renderPalettePreview(preview, colors)
						applyCustomPalette(colors)
						status.textContent = `已从 ${file.name} 提取配色。`
					} catch (error) {
						console.error(error)
						status.textContent = "图片读取失败，请换一张常见格式图片。"
					} finally {
						input.value = ""
					}
				})

				label.appendChild(input)
				row.append(label, status, preview)
				colorsList.appendChild(row)
			}

			async function extractPaletteFromImage(file, count = 6) {
				const image = await loadImage(file)
				const canvas = document.createElement("canvas")
				const maxSide = 180
				const scale = Math.min(1, maxSide / Math.max(image.width, image.height))
				canvas.width = Math.max(1, Math.round(image.width * scale))
				canvas.height = Math.max(1, Math.round(image.height * scale))

				const context = canvas.getContext("2d", { willReadFrequently: true })
				context.drawImage(image, 0, 0, canvas.width, canvas.height)
				const pixels = context.getImageData(0, 0, canvas.width, canvas.height).data
				const buckets = new Map()
				const step = Math.max(4, Math.floor(pixels.length / 4 / 12000) * 4)

				for (let index = 0; index < pixels.length; index += step) {
					const alpha = pixels[index + 3]
					if (alpha < 180) continue
					const r = pixels[index]
					const g = pixels[index + 1]
					const b = pixels[index + 2]
					const key = `${r >> 4},${g >> 4},${b >> 4}`
					const bucket = buckets.get(key) || { r: 0, g: 0, b: 0, count: 0 }
					bucket.r += r
					bucket.g += g
					bucket.b += b
					bucket.count += 1
					buckets.set(key, bucket)
				}

				const candidates = [...buckets.values()]
					.map((bucket) => {
						const r = Math.round(bucket.r / bucket.count)
						const g = Math.round(bucket.g / bucket.count)
						const b = Math.round(bucket.b / bucket.count)
						const [h, s, l] = rgbToHsl(r, g, b)
						return { r, g, b, h, s, l, count: bucket.count, score: bucket.count * (0.72 + s * 0.5) }
					})
					.sort((a, b) => b.score - a.score)

				const selected = []
				for (const threshold of [82, 64, 48, 32, 0]) {
					for (const color of candidates) {
						if (selected.length >= count) break
						if (selected.some((picked) => colorDistance(color, picked) < threshold)) continue
						selected.push(color)
					}
					if (selected.length >= count) break
				}

				while (selected.length < count) {
					selected.push(selected[selected.length - 1] || { r: 240, g: 240, b: 240 })
				}

				return selected.slice(0, count).map(({ r, g, b }) => rgbToHex(r, g, b))
			}

			function loadImage(file) {
				return new Promise((resolve, reject) => {
					const url = URL.createObjectURL(file)
					const image = new Image()
					image.onload = () => {
						URL.revokeObjectURL(url)
						resolve(image)
					}
					image.onerror = () => {
						URL.revokeObjectURL(url)
						reject(new Error("Unable to load image."))
					}
					image.src = url
				})
			}

			function renderPalettePreview(container, colors) {
				container.innerHTML = ""
				container.classList.remove("hidden")
				container.classList.add("flex")
				colors.forEach((hex) => {
					const swatch = document.createElement("div")
					swatch.setAttribute("class", "h-8 flex-1 rounded-lg border border-white/70 shadow-sm")
					swatch.style.background = hex
					container.appendChild(swatch)
				})
			}

			function rgbToHex(r, g, b) {
				return `#${[r, g, b].map((value) => value.toString(16).padStart(2, "0")).join("").toUpperCase()}`
			}

			function rgbToHsl(r, g, b) {
				r /= 255
				g /= 255
				b /= 255
				const max = Math.max(r, g, b)
				const min = Math.min(r, g, b)
				let h = 0
				let s = 0
				const l = (max + min) / 2
				if (max !== min) {
					const d = max - min
					s = l > 0.5 ? d / (2 - max - min) : d / (max + min)
					switch (max) {
						case r:
							h = (g - b) / d + (g < b ? 6 : 0)
							break
						case g:
							h = (b - r) / d + 2
							break
						default:
							h = (r - g) / d + 4
					}
					h /= 6
				}
				return [h, s, l]
			}

			function colorDistance(a, b) {
				return Math.hypot(a.r - b.r, a.g - b.g, a.b - b.b)
			}

			function buildBasicOptions() {
				optionsList.innerHTML = ""
				const optionDefs = Options[currentBg.name] || []
				if (optionDefs.length === 0) {
					const empty = document.createElement("li")
					empty.setAttribute("class", "p-3 text-sm text-gray-500")
					empty.textContent = "No basic options."
					optionsList.appendChild(empty)
					return
				}

				optionDefs.forEach((definition) => {
					const row = document.createElement("li")
					row.setAttribute("class", "flex items-center")

					const label = document.createElement("div")
					label.setAttribute("class", "slider-label my-1 mr-6 w-28 text-sm text-right")
					label.textContent = definition.display || definition.name

					const value = document.createElement("div")
					value.setAttribute("class", "slider-num ml-4 w-14 text-sm")
					value.textContent = definition.value

					const input = document.createElement("input")
					input.value = definition.value
					input.setAttribute("class", "slider-range w-40")
					if (definition.type === "range") {
						input.type = "range"
						input.min = definition.min
						input.max = definition.max
						input.step = definition.step
					} else {
						input.type = "text"
					}
					input.addEventListener("input", () => {
						value.textContent = input.value
						applyBasicOption(definition.name, input.value)
					})

					row.append(label, input, value)
					optionsList.appendChild(row)
				})
			}

			function applyBasicOption(name, value) {
				if (!colorbg) return
				if (name === "playbackSpeed" && typeof colorbg.setPlaybackSpeed === "function") {
					colorbg.setPlaybackSpeed(value)
				} else if (name === "seed") {
					colorbg.reset(parseFloat(value))
				} else if (typeof colorbg.update === "function") {
					colorbg.update(name, value)
				}
			}

			function buildAdvancedOptions() {
				advancedList.innerHTML = ""
				const groups = collectUniformControls(colorbg)
				if (groups.length === 0) {
					const empty = document.createElement("li")
					empty.setAttribute("class", "p-3 text-sm text-gray-500")
					empty.textContent = "No advanced uniforms found."
					advancedList.appendChild(empty)
					return
				}

				groups.forEach((group) => {
					const title = document.createElement("li")
					title.setAttribute("class", "mt-3 mb-2 px-2 text-xs font-bold uppercase tracking-wide text-gray-500")
					title.textContent = group.label
					advancedList.appendChild(title)

					group.controls.forEach((control) => {
						const row = document.createElement("li")
						row.setAttribute("class", "flex items-center")

						const label = document.createElement("div")
						label.setAttribute("class", "slider-label my-1 mr-6 w-36 text-xs text-right text-gray-600")
						label.textContent = control.label

						const value = document.createElement("div")
						value.setAttribute("class", "slider-num ml-4 w-14 text-xs")
						value.textContent = trimNumber(control.value)

						const input = document.createElement("input")
						input.type = "range"
						input.min = control.min
						input.max = control.max
						input.step = control.step
						input.value = control.value
						input.setAttribute("class", "slider-range w-40")
						input.addEventListener("input", () => {
							colorbg.setUniformValue(control.programKey, control.uniformName, input.value, control.componentIndex)
							value.textContent = trimNumber(input.value)
						})

						row.append(label, input, value)
						advancedList.appendChild(row)
					})
				})
			}

			function collectUniformControls(bg) {
				const knownPrograms = [
					["_planeShader", "Plane"],
					["planeShader", "Plane"],
					["rttProgram", "Render Texture"],
					["_blobShader", "Blob"],
					["_cubeShader", "Cube"]
				]
				return knownPrograms
					.map(([programKey, label]) => {
						const program = bg[programKey]
						if (!program || !program.uniforms) return null
						const controls = Object.entries(program.uniforms).flatMap(([uniformName, uniform]) => makeUniformControls(programKey, uniformName, uniform))
						return controls.length ? { label, controls } : null
					})
					.filter(Boolean)
			}

			function makeUniformControls(programKey, uniformName, uniform) {
				if (!uniform || uniform.value === undefined || shouldHideUniform(uniformName, uniform.value)) return []
				if (typeof uniform.value === "number") return [makeScalarControl(programKey, uniformName, uniformName, uniform.value)]
				if (uniform.value && typeof uniform.value === "object" && typeof uniform.value.length === "number" && uniform.value.length <= 4) {
					return Array.from({ length: uniform.value.length }, (_, index) => {
						const axis = ["x", "y", "z", "w"][index] || index
						return makeScalarControl(programKey, uniformName, `${uniformName}.${axis}`, uniform.value[index], index)
					}).filter(Boolean)
				}
				return []
			}

			function makeScalarControl(programKey, uniformName, label, value, componentIndex = null) {
				if (!Number.isFinite(value)) return null
				return { programKey, uniformName, componentIndex, label, value, ...inferRange(uniformName, label, value) }
			}

			function shouldHideUniform(name, value) {
				if (name.startsWith("u_color_")) return true
				if (name === "tMap" || name === "u_resolution" || name === "u_time" || name === "uTime") return true
				if (value && typeof value === "object" && value.texture) return true
				return false
			}

			function inferRange(name, label, value) {
				const key = `${name} ${label}`.toLowerCase()
				if (key.includes("rotate")) return { min: 0, max: 360, step: 1 }
				if (key.includes("brightness")) return { min: 0, max: 2, step: 0.01 }
				if (key.includes("darkness")) return { min: 0, max: 1, step: 0.01 }
				if (key.includes("radius")) return { min: 0, max: 1, step: 0.01 }
				if (key.includes("border")) return { min: 0, max: 0.3, step: 0.005 }
				if (key.includes("scale")) return { min: 0, max: Math.max(10, value * 3), step: 0.01 }
				if (key.includes("spacing")) return { min: 0, max: Math.max(200, value * 3), step: 1 }
				if (key.includes("fog")) return { min: 0, max: 10000, step: 10 }
				if (key.includes("num")) return { min: 1, max: 40, step: 1 }
				if (key.includes("random") || key.includes("rand") || key.includes("seed")) return { min: -500, max: 1000, step: 1 }
				if (value >= 0 && value <= 1) return { min: 0, max: 1, step: 0.01 }
				return { min: Math.min(-100, value * 2), max: Math.max(100, value * 2), step: 0.01 }
			}

			function bindPanels() {
				bindHoverPanel("#btn_show_colors", "#box_colors", ".colors-list-box")
				bindHoverPanel("#btn_show_options", "#box_options", ".options-list-box")
				bindHoverPanel("#btn_show_advanced_options", "#box_advanced_options", ".advanced-list-box")
				bindHoverPanel("#btn_show_export", "#box_export", ".export-list-box")
				document.querySelector("#btn_resetSeed").addEventListener("click", () => colorbg.reset(Math.floor(Math.random() * 100000)))
			}

			function bindHoverPanel(buttonSelector, boxSelector, panelSelector) {
				document.querySelector(buttonSelector).addEventListener("mouseenter", () => {
					const box = document.querySelector(boxSelector)
					const panel = document.querySelector(panelSelector)
					panel.style.display = "block"
					box.classList.add("is-open")
					setTimeout(() => panel.classList.add("show"), 20)
				})
				document.querySelector(boxSelector).addEventListener("mouseleave", () => {
					const box = document.querySelector(boxSelector)
					const panel = document.querySelector(panelSelector)
					panel.classList.remove("show")
					box.classList.remove("is-open")
					setTimeout(() => {
						if (!box.matches(":hover")) panel.style.display = "none"
					}, 160)
				})
			}

			function bindExport() {
				durationInput.addEventListener("input", updateEstimate)
				fpsSelect.addEventListener("change", updateEstimate)
				bitrateSelect.addEventListener("change", updateEstimate)
				recordBtn.addEventListener("click", startRecording)
				stopBtn.addEventListener("click", stopRecording)
			}

			function getSupportedFormat() {
				if (!("MediaRecorder" in window)) return null
				return recorderFormats.find((format) => MediaRecorder.isTypeSupported(format.mimeType)) || null
			}

			async function startRecording() {
				if (!activeFormat || !colorbg) return
				const canvas = stage.querySelector("canvas")
				if (!canvas || typeof canvas.captureStream !== "function") {
					statusLine.textContent = "No recordable WebGL canvas found."
					return
				}
				const durationMs = clamp(Number(durationInput.value) || 180, 1, 600) * 1000
				const fps = Number(fpsSelect.value) || 30
				const bitrate = Number(bitrateSelect.value) || 30000000
				const chunks = []

				progress.value = 0
				recordBtn.disabled = true
				stopBtn.disabled = false
				downloadLink.classList.add("hidden")
				statusLine.textContent = `Recording ${durationMs / 1000}s. Keep this tab open.`

				const stream = canvas.captureStream(fps)
				mediaRecorder = new MediaRecorder(stream, {
					mimeType: activeFormat.mimeType,
					videoBitsPerSecond: bitrate
				})
				mediaRecorder.addEventListener("dataavailable", (event) => {
					if (event.data && event.data.size > 0) chunks.push(event.data)
				})
				mediaRecorder.addEventListener("stop", () => {
					clearTimers()
					stream.getTracks().forEach((track) => track.stop())
					const blob = new Blob(chunks, { type: activeFormat.mimeType })
					const timestamp = new Date().toISOString().replace(/[:.]/g, "-")
					const filename = `color4bg-${currentBg.name}-1080p-${fps}fps-${timestamp}.${activeFormat.extension}`
					objectUrl = URL.createObjectURL(blob)
					downloadLink.href = objectUrl
					downloadLink.download = filename
					downloadLink.textContent = `Download ${filename}`
					downloadLink.classList.remove("hidden")
					statusLine.textContent = `Done. File size: ${formatBytes(blob.size)}.`
					recordBtn.disabled = false
					stopBtn.disabled = true
					progress.value = 1
					mediaRecorder = null
				})

				startedAt = performance.now()
				mediaRecorder.start(1000)
				progressTimer = setInterval(() => {
					const elapsed = performance.now() - startedAt
					progress.value = Math.min(elapsed / durationMs, 1)
					statusLine.textContent = `Recording: ${formatTime(elapsed / 1000)} / ${formatTime(durationMs / 1000)}`
				}, 250)
				recordTimer = setTimeout(stopRecording, durationMs)
			}

			function stopRecording() {
				if (mediaRecorder && mediaRecorder.state === "recording") {
					mediaRecorder.stop()
					statusLine.textContent = "Packaging video..."
				}
				clearTimers()
			}

			function clearTimers() {
				if (recordTimer) clearTimeout(recordTimer)
				if (progressTimer) clearInterval(progressTimer)
				recordTimer = null
				progressTimer = null
			}

			function updateEstimate() {
				const duration = clamp(Number(durationInput.value) || 180, 1, 600)
				const fps = Number(fpsSelect.value) || 30
				const bitrate = Number(bitrateSelect.value) || 30000000
				const frames = duration * fps
				const estimatedBytes = (bitrate / 8) * duration
				estimateLabel.textContent = `${frames.toLocaleString()} frames, estimated ${formatBytes(estimatedBytes)}`
			}

			function getBgFromUrl() {
				return new URLSearchParams(window.location.search).get("bg")
			}

			function trimNumber(value) {
				const num = parseFloat(value)
				if (!Number.isFinite(num)) return value
				return Math.round(num * 1000) / 1000
			}

			function clamp(value, min, max) {
				return Math.min(Math.max(value, min), max)
			}

			function formatTime(totalSeconds) {
				const seconds = Math.max(0, Math.floor(totalSeconds))
				const m = Math.floor(seconds / 60)
				const s = seconds % 60
				return `${m}:${String(s).padStart(2, "0")}`
			}

			function formatBytes(bytes) {
				if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`
				if (bytes < 1024 * 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(1)} MB`
				return `${(bytes / 1024 / 1024 / 1024).toFixed(2)} GB`
			}
		</script>
